<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SparesMaster — Create Account</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .auth-card {
      width: 100%;
      max-width: 460px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 40px;
      box-shadow: var(--shadow-modal);
      animation: slideUp 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--amber), transparent);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .auth-logo-icon {
      width: 42px; height: 42px;
      background: var(--amber);
      border-radius: var(--radius-sm);
      display: grid; place-items: center;
      box-shadow: 0 0 24px var(--amber-glow);
      flex-shrink: 0;
    }

    .auth-logo-icon svg { color: #fff; }

    .auth-brand-text .brand-name {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 800;
      color: var(--text-primary); letter-spacing: -0.02em;
    }

    .auth-brand-text .brand-sub {
      font-family: var(--font-mono);
      font-size: 10px; color: var(--text-muted);
      letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1px;
    }

    .auth-heading {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 800;
      color: var(--text-primary); letter-spacing: -0.03em; margin-bottom: 6px;
    }

    .auth-sub { font-size: 13.5px; color: var(--text-secondary); margin-bottom: 24px; }

    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-field { display: flex; flex-direction: column; gap: 6px; }

    .auth-label {
      font-family: var(--font-mono); font-size: 11px; font-weight: 600;
      color: var(--text-secondary); letter-spacing: 0.08em; text-transform: uppercase;
    }

    .auth-input-wrap { position: relative; }

    .auth-input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: var(--transition);
    }

    .auth-input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-dim); }
    .auth-input::placeholder { color: var(--text-muted); }
    .auth-input.has-icon { padding-right: 44px; }
    .auth-input.error { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-dim); }

    .pwd-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 4px; display: grid; place-items: center;
      transition: var(--transition);
    }

    .pwd-toggle:hover { color: var(--text-secondary); }

    /* Password strength bar */
    .pwd-strength { margin-top: 6px; }
    .pwd-strength-bar {
      height: 3px; border-radius: 99px;
      background: var(--border); overflow: hidden;
    }

    .pwd-strength-fill {
      height: 100%; border-radius: 99px;
      width: 0%; transition: width 0.3s ease, background 0.3s ease;
    }

    .pwd-strength-label {
      font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
      margin-top: 4px; letter-spacing: 0.06em;
    }

    .auth-error {
      display: none; background: var(--red-dim);
      border: 1px solid rgba(239,68,68,0.25); border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 13px; color: var(--red);
      gap: 8px; align-items: flex-start;
    }

    .auth-error.show { display: flex; }

    .auth-success {
      display: none; background: var(--green-dim);
      border: 1px solid rgba(16,185,129,0.25); border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 13px; color: var(--green);
      gap: 8px; align-items: flex-start;
    }

    .auth-success.show { display: flex; }

    /* Terms checkbox */
    .terms-row {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 13px; color: var(--text-secondary);
    }

    .terms-row input[type="checkbox"] {
      width: 15px; height: 15px; margin-top: 2px;
      accent-color: var(--amber); cursor: pointer; flex-shrink: 0;
    }

    .terms-row a { color: var(--amber); text-decoration: none; font-weight: 500; }
    .terms-row a:hover { color: #b91c3c; }

    .auth-submit {
      width: 100%; padding: 12px;
      background: var(--amber); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-family: var(--font-display); font-size: 14px; font-weight: 700;
      letter-spacing: 0.02em; cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 4px;
    }

    .auth-submit:hover:not(:disabled) {
      background: #b91c3c; box-shadow: 0 0 28px var(--amber-glow); transform: translateY(-1px);
    }

    .auth-submit:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
    }

    .auth-submit.loading .spinner   { display: block; }
    .auth-submit.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .field-error { font-size: 12px; color: var(--red); display: none; }
    .field-error.show { display: block; }

    .auth-footer {
      text-align: center; font-size: 13.5px; color: var(--text-secondary); margin-top: 20px;
    }

    .auth-footer a { color: var(--amber); font-weight: 600; text-decoration: none; }
    .auth-footer a:hover { color: #b91c3c; }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 22px; border-radius: var(--radius-lg); }
      .auth-heading { font-size: 19px; }
    }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Brand -->
    <div class="auth-brand">
      <div class="auth-logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m16.5 9.4-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.29 7 12 12 20.71 7"/><line x1="12" y1="22" x2="12" y2="12"/>
        </svg>
      </div>
      <div class="auth-brand-text">
        <div class="brand-name">SparesMaster</div>
        <div class="brand-sub">Inventory Control v2</div>
      </div>
    </div>

    <h1 class="auth-heading">Create your account</h1>
    <p class="auth-sub">Start managing your inventory in minutes</p>

    <!-- Banners -->
    <div class="auth-error" id="auth-error" role="alert">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="auth-error-text"></span>
    </div>
    <div class="auth-success" id="auth-success" role="status">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><polyline points="9 11 12 14 22 4"/></svg>
      <span id="auth-success-text"></span>
    </div>

    <!-- Form -->
    <form class="auth-form" id="signup-form" novalidate>

      <!-- Full Name -->
      <div class="auth-field">
        <label class="auth-label" for="full-name">Full Name</label>
        <input class="auth-input" type="text" id="full-name" name="fullName"
          placeholder="John Smith" autocomplete="name" required />
        <span class="field-error" id="full-name-error"></span>
      </div>

      <!-- Email -->
      <div class="auth-field">
        <label class="auth-label" for="email">Email Address</label>
        <input class="auth-input" type="email" id="email" name="email"
          placeholder="you@company.com" autocomplete="email" required />
        <span class="field-error" id="email-error"></span>
      </div>

      <!-- Password -->
      <div class="auth-field">
        <label class="auth-label" for="password">Password</label>
        <div class="auth-input-wrap">
          <input class="auth-input has-icon" type="password" id="password" name="password"
            placeholder="Min. 8 characters" autocomplete="new-password" required />
          <button type="button" class="pwd-toggle" id="pwd-toggle-1" aria-label="Toggle password">
            <svg id="eye1-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye1-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <!-- Strength indicator -->
        <div class="pwd-strength" id="pwd-strength" style="display:none">
          <div class="pwd-strength-bar"><div class="pwd-strength-fill" id="pwd-fill"></div></div>
          <div class="pwd-strength-label" id="pwd-label"></div>
        </div>
        <span class="field-error" id="password-error"></span>
      </div>

      <!-- Confirm Password -->
      <div class="auth-field">
        <label class="auth-label" for="confirm-password">Confirm Password</label>
        <div class="auth-input-wrap">
          <input class="auth-input has-icon" type="password" id="confirm-password" name="confirmPassword"
            placeholder="Repeat password" autocomplete="new-password" required />
          <button type="button" class="pwd-toggle" id="pwd-toggle-2" aria-label="Toggle password">
            <svg id="eye2-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye2-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <span class="field-error" id="confirm-password-error"></span>
      </div>

      <!-- Terms -->
      <div class="terms-row">
        <input type="checkbox" id="terms" name="terms" />
        <label for="terms">
          I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
        </label>
      </div>
      <span class="field-error" id="terms-error"></span>

      <!-- Submit -->
      <button type="submit" class="auth-submit" id="submit-btn">
        <div class="spinner"></div>
        <span class="btn-label">Create Account</span>
      </button>

    </form>

    <p class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </p>

  </div>
</div>

<script>
const API = '/api/auth';

const form        = document.getElementById('signup-form');
const fullNameEl  = document.getElementById('full-name');
const emailEl     = document.getElementById('email');
const passwordEl  = document.getElementById('password');
const confirmEl   = document.getElementById('confirm-password');
const termsEl     = document.getElementById('terms');
const submitBtn   = document.getElementById('submit-btn');
const errorBox    = document.getElementById('auth-error');
const errorText   = document.getElementById('auth-error-text');
const successBox  = document.getElementById('auth-success');
const successText = document.getElementById('auth-success-text');

// ── Already logged in? ────────────────────────────────────────────────────────
(async () => {
  try {
    const res = await fetch(`${API}/me`, { credentials: 'include' });
    if (res.ok) window.location.replace('index.html');
  } catch { /* stay */ }
})();

// ── Password toggles ──────────────────────────────────────────────────────────
function makeToggle(btnId, inputEl, openId, offId) {
  document.getElementById(btnId).addEventListener('click', () => {
    const show = inputEl.type === 'password';
    inputEl.type = show ? 'text' : 'password';
    document.getElementById(openId).style.display = show ? 'none' : '';
    document.getElementById(offId).style.display  = show ? ''     : 'none';
  });
}

makeToggle('pwd-toggle-1', passwordEl, 'eye1-open', 'eye1-off');
makeToggle('pwd-toggle-2', confirmEl,  'eye2-open', 'eye2-off');

// ── Password strength ─────────────────────────────────────────────────────────
passwordEl.addEventListener('input', () => {
  const val = passwordEl.value;
  const strengthWrap = document.getElementById('pwd-strength');
  const fill  = document.getElementById('pwd-fill');
  const label = document.getElementById('pwd-label');

  if (!val) { strengthWrap.style.display = 'none'; return; }
  strengthWrap.style.display = 'block';

  let score = 0;
  if (val.length >= 8)         score++;
  if (/[A-Z]/.test(val))       score++;
  if (/[0-9]/.test(val))       score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;

  const levels = [
    { width: '20%', color: '#ef4444', text: 'WEAK' },
    { width: '40%', color: '#f97316', text: 'FAIR' },
    { width: '65%', color: '#eab308', text: 'GOOD' },
    { width: '100%',color: '#10b981', text: 'STRONG' },
  ];

  const level = levels[Math.min(score - 1, 3)] || levels[0];
  fill.style.width      = level.width;
  fill.style.background = level.color;
  label.textContent     = level.text;
  label.style.color     = level.color;
});

// ── UI helpers ────────────────────────────────────────────────────────────────
function showError(msg) {
  errorText.textContent = msg;
  errorBox.classList.add('show');
  successBox.classList.remove('show');
}

function showSuccess(msg) {
  successText.textContent = msg;
  successBox.classList.add('show');
  errorBox.classList.remove('show');
}

function clearMessages() {
  errorBox.classList.remove('show');
  successBox.classList.remove('show');
}

function setFieldError(inputId, errorId, message) {
  const input = document.getElementById(inputId);
  const err   = document.getElementById(errorId);
  if (input) input.classList.toggle('error', !!message);
  err.textContent = message || '';
  err.classList.toggle('show', !!message);
}

function clearFieldError(inputId, errorId) {
  setFieldError(inputId, errorId, '');
}

function setLoading(loading) {
  submitBtn.disabled = loading;
  submitBtn.classList.toggle('loading', loading);
}

// ── Form submit ───────────────────────────────────────────────────────────────
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMessages();

  let valid = true;

  if (!fullNameEl.value.trim() || fullNameEl.value.trim().length < 2) {
    setFieldError('full-name', 'full-name-error', 'Full name must be at least 2 characters');
    valid = false;
  } else { clearFieldError('full-name', 'full-name-error'); }

  const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value.trim());
  if (!emailEl.value.trim() || !emailValid) {
    setFieldError('email', 'email-error', 'Please enter a valid email address');
    valid = false;
  } else { clearFieldError('email', 'email-error'); }

  if (passwordEl.value.length < 8 || !/[A-Z]/.test(passwordEl.value) || !/[0-9]/.test(passwordEl.value)) {
    setFieldError('password', 'password-error', 'Password must be 8+ chars, with one uppercase and one number');
    valid = false;
  } else { clearFieldError('password', 'password-error'); }

  if (confirmEl.value !== passwordEl.value) {
    setFieldError('confirm-password', 'confirm-password-error', 'Passwords do not match');
    valid = false;
  } else { clearFieldError('confirm-password', 'confirm-password-error'); }

  if (!termsEl.checked) {
    setFieldError(null, 'terms-error', 'You must accept the terms to continue');
    valid = false;
  } else { clearFieldError(null, 'terms-error'); }

  if (!valid) return;

  setLoading(true);

  try {
    const res = await fetch(`${API}/register`, {
      method:      'POST',
      credentials: 'include',
      headers:     { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        fullName:        fullNameEl.value.trim(),
        email:           emailEl.value.trim().toLowerCase(),
        password:        passwordEl.value,
        confirmPassword: confirmEl.value,
      }),
    });

    const data = await res.json();

    if (!res.ok) {
      if (data.errors && data.errors.length) {
        data.errors.forEach(err => {
          const map = { fullName: 'full-name', email: 'email', password: 'password', confirmPassword: 'confirm-password' };
          const id = map[err.field];
          if (id) setFieldError(id, id + '-error', err.message);
        });
      }
      showError(data.message || 'Registration failed. Please try again.');
      return;
    }

    if (data.data && data.data.token) {
      localStorage.setItem('auth_token', data.data.token);
      if (data.data.user) localStorage.setItem('auth_user', JSON.stringify(data.data.user));
    }

    showSuccess('Account created! Redirecting to your dashboard...');
    setTimeout(() => { window.location.replace('index.html'); }, 900);

  } catch (err) {
    showError('Network error. Please check your connection and try again.');
    console.error('Register error:', err);
  } finally {
    setLoading(false);
  }
});

// ── Clear field errors on input ───────────────────────────────────────────────
[fullNameEl, emailEl, passwordEl, confirmEl].forEach(el => {
  el.addEventListener('input', () => {
    el.classList.remove('error');
    clearMessages();
  });
});
</script>
</body>
</html>
