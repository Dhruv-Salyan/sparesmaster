<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SparesMaster — Reset Password</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .auth-page {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 24px; position: relative; z-index: 1;
    }

    .auth-card {
      width: 100%; max-width: 430px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 40px;
      box-shadow: var(--shadow-modal);
      animation: slideUp 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative; overflow: hidden;
    }

    .auth-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--amber), transparent);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }

    .auth-logo-icon {
      width: 42px; height: 42px; background: var(--amber); border-radius: var(--radius-sm);
      display: grid; place-items: center; box-shadow: 0 0 24px var(--amber-glow); flex-shrink: 0;
    }

    .auth-logo-icon svg { color: #fff; }

    .auth-brand-text .brand-name {
      font-family: var(--font-display); font-size: 18px; font-weight: 800;
      color: var(--text-primary); letter-spacing: -0.02em;
    }

    .auth-brand-text .brand-sub {
      font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
      letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1px;
    }

    .auth-heading {
      font-family: var(--font-display); font-size: 22px; font-weight: 800;
      color: var(--text-primary); letter-spacing: -0.03em; margin-bottom: 6px;
    }

    .auth-sub { font-size: 13.5px; color: var(--text-secondary); margin-bottom: 24px; }
    .auth-form { display: flex; flex-direction: column; gap: 16px; }
    .auth-field { display: flex; flex-direction: column; gap: 6px; }

    .auth-label {
      font-family: var(--font-mono); font-size: 11px; font-weight: 600;
      color: var(--text-secondary); letter-spacing: 0.08em; text-transform: uppercase;
    }

    .auth-input-wrap { position: relative; }

    .auth-input {
      width: 100%; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text-primary); font-family: var(--font-body); font-size: 14px;
      padding: 11px 44px 11px 14px; outline: none; transition: var(--transition);
    }

    .auth-input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-dim); }
    .auth-input::placeholder { color: var(--text-muted); }
    .auth-input.error { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-dim); }

    .pwd-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      padding: 4px; display: grid; place-items: center; transition: var(--transition);
    }

    .pwd-toggle:hover { color: var(--text-secondary); }

    .auth-error {
      display: none; background: var(--red-dim);
      border: 1px solid rgba(239,68,68,0.25); border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 13px; color: var(--red);
      gap: 8px; align-items: flex-start;
    }

    .auth-error.show { display: flex; }

    .auth-success {
      display: none; background: var(--green-dim);
      border: 1px solid rgba(16,185,129,0.25); border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 13px; color: var(--green);
      gap: 8px; align-items: flex-start;
    }

    .auth-success.show { display: flex; }

    .auth-submit {
      width: 100%; padding: 12px; background: var(--amber); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-family: var(--font-display); font-size: 14px; font-weight: 700;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .auth-submit:hover:not(:disabled) {
      background: #b91c3c; box-shadow: 0 0 28px var(--amber-glow); transform: translateY(-1px);
    }

    .auth-submit:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
    }

    .auth-submit.loading .spinner   { display: block; }
    .auth-submit.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .field-error { font-size: 12px; color: var(--red); display: none; }
    .field-error.show { display: block; }

    .invalid-token {
      text-align: center; padding: 20px 0;
    }

    .invalid-token p { color: var(--text-secondary); margin-bottom: 16px; font-size: 14px; }

    .auth-link-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; background: var(--amber); color: #fff;
      border-radius: var(--radius-sm); text-decoration: none;
      font-family: var(--font-display); font-weight: 700; font-size: 13px;
      transition: var(--transition);
    }

    .auth-link-btn:hover { background: #b91c3c; }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="auth-logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m16.5 9.4-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.29 7 12 12 20.71 7"/><line x1="12" y1="22" x2="12" y2="12"/>
        </svg>
      </div>
      <div class="auth-brand-text">
        <div class="brand-name">SparesMaster</div>
        <div class="brand-sub">Inventory Control v2</div>
      </div>
    </div>

    <!-- No token state -->
    <div id="no-token" class="invalid-token" style="display:none">
      <h1 class="auth-heading">Invalid Reset Link</h1>
      <p>This reset link is invalid or has expired. Please request a new one.</p>
      <a href="forgot-password.html" class="auth-link-btn">Request New Link</a>
    </div>

    <!-- Form (shown when token is present) -->
    <div id="form-section">
      <h1 class="auth-heading">Set new password</h1>
      <p class="auth-sub">Choose a strong password for your account.</p>

      <div class="auth-error" id="auth-error" role="alert">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="auth-error-text"></span>
      </div>
      <div class="auth-success" id="auth-success" role="status">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><polyline points="9 11 12 14 22 4"/></svg>
        <span id="auth-success-text"></span>
      </div>

      <form class="auth-form" id="reset-form" novalidate>
        <div class="auth-field">
          <label class="auth-label" for="password">New Password</label>
          <div class="auth-input-wrap">
            <input class="auth-input" type="password" id="password" name="password"
              placeholder="Min. 8 characters" autocomplete="new-password" required />
            <button type="button" class="pwd-toggle" id="pwd-toggle-1">
              <svg id="eye1-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye1-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <span class="field-error" id="password-error"></span>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="confirm-password">Confirm Password</label>
          <div class="auth-input-wrap">
            <input class="auth-input" type="password" id="confirm-password" name="confirmPassword"
              placeholder="Repeat password" autocomplete="new-password" required />
            <button type="button" class="pwd-toggle" id="pwd-toggle-2">
              <svg id="eye2-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye2-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <span class="field-error" id="confirm-error"></span>
        </div>

        <button type="submit" class="auth-submit" id="submit-btn">
          <div class="spinner"></div>
          <span class="btn-label">Update Password</span>
        </button>
      </form>
    </div>

  </div>
</div>

<script>
const API = '/api/auth';

// Extract token from URL
const params = new URLSearchParams(window.location.search);
const token  = params.get('token');

if (!token) {
  document.getElementById('form-section').style.display = 'none';
  document.getElementById('no-token').style.display     = 'block';
}

const form      = document.getElementById('reset-form');
const pwdEl     = document.getElementById('password');
const confirmEl = document.getElementById('confirm-password');
const submitBtn = document.getElementById('submit-btn');
const errorBox  = document.getElementById('auth-error');
const errorText = document.getElementById('auth-error-text');
const successBox  = document.getElementById('auth-success');
const successText = document.getElementById('auth-success-text');

function makeToggle(btnId, inputEl, openId, offId) {
  document.getElementById(btnId).addEventListener('click', () => {
    const show = inputEl.type === 'password';
    inputEl.type = show ? 'text' : 'password';
    document.getElementById(openId).style.display = show ? 'none' : '';
    document.getElementById(offId).style.display  = show ? ''     : 'none';
  });
}

makeToggle('pwd-toggle-1', pwdEl,     'eye1-open', 'eye1-off');
makeToggle('pwd-toggle-2', confirmEl, 'eye2-open', 'eye2-off');

function showError(msg) {
  errorText.textContent = msg; errorBox.classList.add('show');
  successBox.classList.remove('show');
}

function showSuccess(msg) {
  successText.textContent = msg; successBox.classList.add('show');
  errorBox.classList.remove('show');
}

function setLoading(loading) {
  submitBtn.disabled = loading;
  submitBtn.classList.toggle('loading', loading);
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBox.classList.remove('show'); successBox.classList.remove('show');

  const pwdErr     = document.getElementById('password-error');
  const confirmErr = document.getElementById('confirm-error');
  let valid = true;

  if (pwdEl.value.length < 8 || !/[A-Z]/.test(pwdEl.value) || !/[0-9]/.test(pwdEl.value)) {
    pwdEl.classList.add('error');
    pwdErr.textContent = 'Password must be 8+ chars, one uppercase, one number';
    pwdErr.classList.add('show');
    valid = false;
  } else {
    pwdEl.classList.remove('error'); pwdErr.classList.remove('show');
  }

  if (confirmEl.value !== pwdEl.value) {
    confirmEl.classList.add('error');
    confirmErr.textContent = 'Passwords do not match';
    confirmErr.classList.add('show');
    valid = false;
  } else {
    confirmEl.classList.remove('error'); confirmErr.classList.remove('show');
  }

  if (!valid) return;

  setLoading(true);

  try {
    const res = await fetch(`${API}/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pwdEl.value, confirmPassword: confirmEl.value }),
    });

    const data = await res.json();

    if (!res.ok) {
      showError(data.message || 'Reset failed. The link may have expired.');
      return;
    }

    showSuccess('Password updated! Redirecting to login...');
    form.style.opacity = '0.5'; form.style.pointerEvents = 'none';
    setTimeout(() => { window.location.replace('login.html'); }, 1500);

  } catch (err) {
    showError('Network error. Please try again.');
  } finally {
    setLoading(false);
  }
});
</script>
</body>
</html>
