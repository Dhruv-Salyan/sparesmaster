<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SparesMaster — Forgot Password</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .auth-page {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 24px; position: relative; z-index: 1;
    }

    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 40px;
      box-shadow: var(--shadow-modal);
      animation: slideUp 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative; overflow: hidden;
    }

    .auth-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--amber), transparent);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }

    .auth-logo-icon {
      width: 42px; height: 42px; background: var(--amber); border-radius: var(--radius-sm);
      display: grid; place-items: center; box-shadow: 0 0 24px var(--amber-glow); flex-shrink: 0;
    }

    .auth-logo-icon svg { color: #fff; }

    .auth-brand-text .brand-name {
      font-family: var(--font-display); font-size: 18px; font-weight: 800;
      color: var(--text-primary); letter-spacing: -0.02em;
    }

    .auth-brand-text .brand-sub {
      font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
      letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1px;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-muted); font-size: 13px; text-decoration: none;
      margin-bottom: 20px; transition: var(--transition);
    }

    .back-link:hover { color: var(--text-secondary); }

    .auth-heading {
      font-family: var(--font-display); font-size: 22px; font-weight: 800;
      color: var(--text-primary); letter-spacing: -0.03em; margin-bottom: 6px;
    }

    .auth-sub { font-size: 13.5px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; }

    .auth-form { display: flex; flex-direction: column; gap: 16px; }
    .auth-field { display: flex; flex-direction: column; gap: 6px; }

    .auth-label {
      font-family: var(--font-mono); font-size: 11px; font-weight: 600;
      color: var(--text-secondary); letter-spacing: 0.08em; text-transform: uppercase;
    }

    .auth-input {
      width: 100%; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text-primary); font-family: var(--font-body); font-size: 14px;
      padding: 11px 14px; outline: none; transition: var(--transition);
    }

    .auth-input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-dim); }
    .auth-input::placeholder { color: var(--text-muted); }
    .auth-input.error { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-dim); }

    .auth-error {
      display: none; background: var(--red-dim);
      border: 1px solid rgba(239,68,68,0.25); border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 13px; color: var(--red);
      gap: 8px; align-items: flex-start;
    }

    .auth-error.show { display: flex; }

    .auth-success {
      display: none; background: var(--green-dim);
      border: 1px solid rgba(16,185,129,0.25); border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 13px; color: var(--green);
      gap: 8px; align-items: flex-start;
    }

    .auth-success.show { display: flex; }

    .auth-submit {
      width: 100%; padding: 12px; background: var(--amber); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-family: var(--font-display); font-size: 14px; font-weight: 700;
      letter-spacing: 0.02em; cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .auth-submit:hover:not(:disabled) {
      background: #b91c3c; box-shadow: 0 0 28px var(--amber-glow); transform: translateY(-1px);
    }

    .auth-submit:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
    }

    .auth-submit.loading .spinner   { display: block; }
    .auth-submit.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .field-error { font-size: 12px; color: var(--red); display: none; }
    .field-error.show { display: block; }

    .auth-footer { text-align: center; font-size: 13.5px; color: var(--text-secondary); margin-top: 20px; }
    .auth-footer a { color: var(--amber); font-weight: 600; text-decoration: none; }
    .auth-footer a:hover { color: #b91c3c; }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 22px; border-radius: var(--radius-lg); }
    }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="auth-logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m16.5 9.4-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.29 7 12 12 20.71 7"/><line x1="12" y1="22" x2="12" y2="12"/>
        </svg>
      </div>
      <div class="auth-brand-text">
        <div class="brand-name">SparesMaster</div>
        <div class="brand-sub">Inventory Control v2</div>
      </div>
    </div>

    <a href="login.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Sign In
    </a>

    <h1 class="auth-heading">Forgot your password?</h1>
    <p class="auth-sub">Enter your email and we'll send you a link to reset your password.</p>

    <div class="auth-error" id="auth-error" role="alert">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="auth-error-text"></span>
    </div>
    <div class="auth-success" id="auth-success" role="status">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><polyline points="9 11 12 14 22 4"/></svg>
      <span id="auth-success-text"></span>
    </div>

    <form class="auth-form" id="forgot-form" novalidate>
      <div class="auth-field">
        <label class="auth-label" for="email">Email Address</label>
        <input class="auth-input" type="email" id="email" name="email"
          placeholder="you@company.com" autocomplete="email" required />
        <span class="field-error" id="email-error"></span>
      </div>

      <button type="submit" class="auth-submit" id="submit-btn">
        <div class="spinner"></div>
        <span class="btn-label">Send Reset Link</span>
      </button>
    </form>

    <p class="auth-footer">
      Remembered it? <a href="login.html">Sign in</a>
    </p>

  </div>
</div>

<script>
const API       = '/api/auth';
const form      = document.getElementById('forgot-form');
const emailEl   = document.getElementById('email');
const submitBtn = document.getElementById('submit-btn');
const errorBox  = document.getElementById('auth-error');
const errorText = document.getElementById('auth-error-text');
const successBox  = document.getElementById('auth-success');
const successText = document.getElementById('auth-success-text');

function showError(msg) {
  errorText.textContent = msg; errorBox.classList.add('show');
  successBox.classList.remove('show');
}

function showSuccess(msg) {
  successText.textContent = msg; successBox.classList.add('show');
  errorBox.classList.remove('show');
}

function setLoading(loading) {
  submitBtn.disabled = loading;
  submitBtn.classList.toggle('loading', loading);
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBox.classList.remove('show'); successBox.classList.remove('show');

  const emailErr = document.getElementById('email-error');

  if (!emailEl.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value.trim())) {
    emailEl.classList.add('error');
    emailErr.textContent = 'Please enter a valid email address';
    emailErr.classList.add('show');
    return;
  }

  emailEl.classList.remove('error');
  emailErr.classList.remove('show');

  setLoading(true);

  try {
    const res = await fetch(`${API}/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: emailEl.value.trim().toLowerCase() }),
    });

    const data = await res.json();

    if (!res.ok) {
      showError(data.message || 'Something went wrong. Please try again.');
      return;
    }

    showSuccess(data.message || 'Check your email for the reset link.');
    form.style.opacity = '0.5';
    form.style.pointerEvents = 'none';

    // Dev helper: log reset URL if returned
    if (data.data && data.data.resetUrl) {
      console.info('[DEV] Reset URL:', data.data.resetUrl);
    }

  } catch (err) {
    showError('Network error. Please try again.');
  } finally {
    setLoading(false);
  }
});

emailEl.addEventListener('input', () => {
  emailEl.classList.remove('error');
  const err = document.getElementById('email-error');
  err.textContent = ''; err.classList.remove('show');
});
</script>
</body>
</html>
